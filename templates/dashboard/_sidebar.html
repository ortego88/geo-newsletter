<!-- SIDEBAR -->
<aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-950 border-r border-slate-800 flex flex-col shrink-0 h-screen -translate-x-full md:translate-x-0 md:sticky md:top-20 md:h-[calc(100vh-5rem)] transition-transform duration-300">
  <nav class="flex-1 px-4 py-6 space-y-1">
    <a href="/dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-lg {% if request.path == '/dashboard' %}bg-slate-800 text-slate-300 font-medium{% else %}hover:bg-slate-800 text-slate-400 hover:text-white transition{% endif %} text-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      <span>{{ t.nav_dashboard }}</span>
    </a>
    <a href="/dashboard/assets" class="flex items-center gap-3 px-3 py-2.5 rounded-lg {% if '/assets' in request.path %}bg-slate-800 text-slate-300 font-medium{% else %}hover:bg-slate-800 text-slate-400 hover:text-white transition{% endif %} text-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
      <span>{{ t.nav_assets }}</span>
    </a>
    <a href="/dashboard/settings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg {% if '/settings' in request.path %}bg-slate-800 text-slate-300 font-medium{% else %}hover:bg-slate-800 text-slate-400 hover:text-white transition{% endif %} text-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      <span>{{ t.nav_settings }}</span>
    </a>
    <a href="/dashboard/subscription" class="flex items-center gap-3 px-3 py-2.5 rounded-lg {% if '/subscription' in request.path %}bg-slate-800 text-slate-300 font-medium{% else %}hover:bg-slate-800 text-slate-400 hover:text-white transition{% endif %} text-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
      <span>{{ t.nav_subscription }}</span>
    </a>
  </nav>

  <div class="px-4 py-4 border-t border-slate-800">
    <div class="px-3 py-2 mb-2">
      <p class="text-white text-sm font-medium">{{ current_user.name }}</p>
      <p class="text-slate-500 text-xs">{{ current_user.email }}</p>
    </div>
    <a href="/logout" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-800 text-slate-400 hover:text-white transition text-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      <span>{{ t.nav_sign_out }}</span>
    </a>
  </div>
</aside>
