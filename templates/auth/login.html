<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — GEO-NEWSLETTER</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="/" class="text-emerald-400 font-bold text-2xl">🌍 GEO-NEWSLETTER</a>
      <p class="text-slate-400 mt-2 text-sm">Alertas geopolíticas para traders</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8">
      <h1 class="text-2xl font-bold text-white mb-6">Iniciar sesión</h1>

      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="mb-4 p-3 rounded-lg text-sm
            {% if category == 'error' %}bg-red-500/10 border border-red-500/30 text-red-400
            {% elif category == 'success' %}bg-emerald-500/10 border border-emerald-500/30 text-emerald-400
            {% else %}bg-blue-500/10 border border-blue-500/30 text-blue-400{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="/login" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Email</label>
          <input type="email" name="email" required autocomplete="email"
            class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition"
            placeholder="tu@email.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Contraseña</label>
          <input type="password" name="password" required autocomplete="current-password"
            class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition"
            placeholder="••••••••">
        </div>
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 text-sm text-slate-400 cursor-pointer">
            <input type="checkbox" name="remember" class="rounded border-slate-600 bg-slate-900 text-emerald-500">
            Recordarme
          </label>
          <a href="#" class="text-sm text-emerald-400 hover:text-emerald-300 transition">¿Olvidaste tu contraseña?</a>
        </div>
        <button type="submit"
          class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 rounded-xl transition">
          Entrar
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-400">
        ¿No tienes cuenta?
        <a href="/register" class="text-emerald-400 hover:text-emerald-300 font-semibold transition">Regístrate gratis</a>
      </p>
    </div>

    <p class="text-center mt-6 text-xs text-slate-600">
      <a href="/" class="hover:text-slate-400 transition">← Volver a la web</a>
    </p>
  </div>

</body>
</html>
