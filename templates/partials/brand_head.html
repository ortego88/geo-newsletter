<!-- Trianio Brand: Favicon + Self-hosted Fonts + Compiled Tailwind -->
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<!-- Preload critical fonts (self-hosted, no external DNS lookup) -->
<link rel="preload" href="/static/fonts/dm-sans-400.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/static/fonts/dm-serif-display-400.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/static/css/fonts.css">
<!-- Compiled Tailwind (static, no runtime JS) -->
<link rel="stylesheet" href="/static/css/tailwind.min.css">
<!-- DataLayer pageview — MUST be before GTM so variables are available when tags fire -->
<script>
window.dataLayer = window.dataLayer || [];
window.dataLayer.push({
  'event': 'pageview',
  'eventName': 'pageview',
  'pageName': '{{ dl_page_name | default("") }}',
  'sectionName': '{{ dl_section_name | default("") }}',
  'serviceType': 'crypto_alerts',
  'language': '{{ request.cookies.get("geo_lang", "es") }}',
  'pathname': '{{ request.path }}',
  'userStatus': '{% if current_user.is_authenticated %}logged_in{% else %}anonymous{% endif %}',
  'userPlan': '{% if current_user.is_authenticated and current_user.get_subscription() %}{{ current_user.get_subscription().plan }}{% else %}none{% endif %}',
  'userType': '{% if current_user.is_authenticated %}user{% else %}visitor{% endif %}'
});
</script>
<!-- Consent Mode v2 (inline, minimal) -->
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('consent', 'default', {
  'analytics_storage': '{{ "granted" if request.cookies.get("trianio_consent") == "granted" else "denied" }}',
  'ad_storage': 'denied',
  'ad_user_data': 'denied',
  'ad_personalization': 'denied',
  'wait_for_update': 500
});
gtag('js', new Date());
</script>
<!-- GTM handles GA4 config — no duplicate gtag config needed -->
<script defer src="https://www.googletagmanager.com/gtag/js?id=G-7RD26FY5G5"></script>
<script defer>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.defer=true;j.src=
'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-P5XZX4DR');</script>
<script src="/static/js/datalayer.js" defer></script>
<script src="/static/js/push.js" defer></script>
<style>
  body { font-family: 'DM Sans', sans-serif; }
  .text-up-green { color: #34d399; }
  .text-down-red { color: #f87171; }
  .badge-correct { background: rgba(52,211,153,0.15); color: #34d399; }
  .badge-incorrect { background: rgba(248,113,113,0.15); color: #f87171; }
  #cookie-banner { display: none !important; }
  #cookie-banner.is-visible { display: block !important; }
</style>
