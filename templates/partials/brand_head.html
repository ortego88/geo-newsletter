<!-- Trianio Brand: Favicon + Self-hosted Fonts + Compiled Tailwind -->
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<!-- Preload only the primary font (400 weight) — 600 is non-critical -->
<link rel="preload" href="/static/fonts/dm-sans-400.woff2" as="font" type="font/woff2" crossorigin>
<!-- fonts.css deferred: swap prevents FOIT, browser uses system font first -->
<link rel="preload" href="/static/css/fonts.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="/static/css/fonts.css"></noscript>
<!-- Tailwind: inline critical above-the-fold styles, defer rest -->
<link rel="preload" href="/static/css/tailwind.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="/static/css/tailwind.min.css"></noscript>
<!-- DataLayer pageview — MUST be before GTM so variables are available when tags fire -->
<script>
window.dataLayer = window.dataLayer || [];
window.dataLayer.push({
  'event': 'pageview',
  'eventName': 'pageview',
  'pageName': '{{ dl_page_name | default("") }}',
  'sectionName': '{{ dl_section_name | default("") }}',
  'processType': '{{ dl_process_type | default("") }}',
  'processStep': '{{ dl_process_step | default("") }}',
  'processDetail': '{{ dl_process_detail | default("") }}',
  'interactionType': 'view',
  'serviceType': '{{ dl_service_type | default("") }}',
  'productName': '{{ dl_product_name | default("") }}',
  'webArea': '{{ dl_web_area | default("public") }}',
  'language': '{{ request.cookies.get("geo_lang", "es") }}',
  'pathname': '{{ request.path }}',
  'userID': '{% if current_user.is_authenticated %}{{ current_user.id }}{% else %}{% endif %}',
  'userStatus': '{% if current_user.is_authenticated %}loggedIn{% else %}loggedOut{% endif %}',
  'userPlan': '{% if current_user.is_authenticated and current_user.get_subscription() %}{{ current_user.get_subscription().plan }}{% else %}none{% endif %}',
  'userType': '{% if current_user.is_authenticated %}client{% else %}prospect{% endif %}'
});
</script>
<!-- Consent Mode v2 (inline, minimal) -->
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('consent', 'default', {
  'analytics_storage': '{{ "granted" if request.cookies.get("trianio_consent") == "granted" else "denied" }}',
  'ad_storage': 'denied',
  'ad_user_data': 'denied',
  'ad_personalization': 'denied',
  'wait_for_update': 500
});
gtag('js', new Date());
</script>
<!-- GTM handles GA4 config — no duplicate gtag config needed -->
<script defer src="https://www.googletagmanager.com/gtag/js?id=G-7RD26FY5G5"></script>
<script defer>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.defer=true;j.src=
'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-P5XZX4DR');</script>
<script src="/static/js/datalayer.js" defer></script>
<script src="/static/js/push.js" defer></script>
<style>
  /* Critical above-the-fold styles — inlined to prevent FOUC */
  *,::after,::before{box-sizing:border-box}
  html{line-height:1.5;-webkit-text-size-adjust:100%}
  body{margin:0;font-family:'DM Sans',sans-serif;background-color:#0f172a;color:#e2e8f0;-webkit-font-smoothing:antialiased}
  /* Nav — prevents flash of unstyled nav */
  nav{position:fixed;top:0;left:0;right:0;z-index:50;background-color:rgba(15,23,42,0.8);border-bottom:1px solid #1e293b}
  #user-menu-wrapper{position:relative}
  #user-dropdown{display:none;position:absolute;right:0;top:100%;margin-top:8px;background:#1e293b;border:1px solid #334155;border-radius:12px;padding:4px 0;z-index:50;min-width:200px}
  #mobile-nav-menu{display:none}
  /* Logo triangle — prevent white flash */
  .text-white{color:#fff}
  .text-slate-400{color:#94a3b8}
  .text-slate-300{color:#cbd5e1}
  .text-emerald-400{color:#E8B84B}
  .bg-slate-900{background-color:#0f172a}
  .bg-slate-800{background-color:#1e293b}
  /* Utility classes needed before Tailwind loads */
  .text-up-green { color: #34d399; }
  .text-down-red { color: #f87171; }
  .badge-correct { background: rgba(52,211,153,0.15); color: #34d399; }
  .badge-incorrect { background: rgba(248,113,113,0.15); color: #f87171; }
  #cookie-banner { display: none !important; }
  #cookie-banner.is-visible { display: block !important; }
  /* Hide elements that need JS/CSS to display correctly */
  [x-cloak]{display:none}
</style>
