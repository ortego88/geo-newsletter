<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        emerald: {
          300: '#F5D98A',
          400: '#E8B84B',
          500: '#C8922A',
          600: '#A87720',
          700: '#8A6018',

        'display': ['"DM Serif Display"', 'serif'],
        'mono': ['"DM Mono"', 'monospace'],
        'sans': ['"DM Sans"', 'sans-serif'],
      }
    }
  }
}
</script>
<style>
  body { font-family: 'DM Sans', sans-serif; }
  .text-up-green { color: #34d399; }
  .text-down-red { color: #f87171; }
  .badge-correct { background: rgba(52,211,153,0.15); color: #34d399; }
