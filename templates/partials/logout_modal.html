<!-- Logout confirmation modal -->
<div id="logout-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
  <div class="bg-slate-900 border border-slate-700 rounded-2xl max-w-sm w-full p-8 text-center">
    <div class="text-4xl mb-4">👋</div>
    <h2 class="text-white font-bold text-xl mb-2">{{ t.logout_modal_title }}</h2>
    <p class="text-slate-400 text-sm mb-6">{{ t.logout_modal_msg }}</p>
    <div class="flex gap-3 justify-center">
      <button onclick="document.getElementById('logout-modal').classList.add('hidden')"
        class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold px-5 py-2.5 rounded-xl transition">
        {{ t.cancel }}
      </button>
      <a href="/logout"
        class="flex-1 bg-red-500 hover:bg-red-400 text-white font-semibold px-5 py-2.5 rounded-xl transition">
        {{ t.nav_sign_out }}
      </a>
    </div>
  </div>
</div>
