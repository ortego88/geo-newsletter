<!-- Cookie Consent Banner -->
<div id="cookie-banner" style="display:none" class="fixed bottom-0 inset-x-0 z-[200] bg-slate-950 border-t border-slate-700 shadow-xl">
  <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
    <div class="flex-1 min-w-0">
      <p class="text-white font-semibold text-sm mb-1" id="cookie-title">🍪 Usamos cookies</p>
      <p class="text-slate-400 text-xs leading-relaxed" id="cookie-desc">
        Utilizamos cookies propias y de terceros para mejorar tu experiencia y analizar el tráfico. Puedes aceptar todas o elegir solo las esenciales.
        <a href="/privacy" class="text-emerald-400 hover:underline ml-1" id="cookie-policy-link">Política de cookies</a>
      </p>
    </div>
    <div class="flex gap-3 shrink-0">
      <button onclick="cookieConsent('essential')"
        id="cookie-essential-btn"
        class="text-sm text-slate-400 hover:text-white border border-slate-600 hover:border-slate-400 px-4 py-2 rounded-lg transition whitespace-nowrap">
        Solo esenciales
      </button>
      <button onclick="cookieConsent('all')"
        id="cookie-accept-btn"
        class="text-sm bg-emerald-500 hover:bg-emerald-400 text-white font-semibold px-4 py-2 rounded-lg transition whitespace-nowrap">
        Aceptar todas
      </button>
    </div>
  </div>
</div>
