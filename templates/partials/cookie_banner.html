<!-- Cookie Consent Banner -->
<div id="cookie-banner" class="hidden fixed bottom-0 left-0 right-0 z-50 p-4 md:p-6">
  <div class="max-w-3xl mx-auto bg-slate-900 border border-slate-700 rounded-2xl p-5 shadow-2xl flex flex-col sm:flex-row items-start sm:items-center gap-4">
    <div class="flex-1 text-sm text-slate-400">
      <span id="cookie-title" class="text-white font-semibold block mb-1">Usamos cookies</span>
      <span id="cookie-desc">Utilizamos cookies analíticas para mejorar tu experiencia. Puedes aceptar todas o solo las esenciales. <a href="/privacy" class="text-emerald-400 hover:underline">Política de cookies</a></span>
    </div>
    <div class="flex gap-2 shrink-0">
      <button id="cookie-essential-btn" onclick="setCookieConsent(false)"
        class="px-4 py-2 rounded-lg border border-slate-600 text-slate-300 hover:border-slate-400 hover:text-white text-sm font-medium transition">
        Solo esenciales
      </button>
      <button id="cookie-accept-btn" onclick="setCookieConsent(true)"
        class="px-4 py-2 rounded-lg bg-emerald-500 hover:bg-emerald-400 text-white text-sm font-bold transition">
        Aceptar todas
      </button>
    </div>
  </div>
</div>

<script>
(function() {
  var CONSENT_KEY = 'trianio_consent';
  var CONSENT_DAYS = 365;

  function getConsent() {
    try { return localStorage.getItem(CONSENT_KEY); } catch(e) { return null; }
  }

  function saveConsent(granted) {
    try {
      localStorage.setItem(CONSENT_KEY, granted ? 'granted' : 'denied');
      var d = new Date();
      d.setTime(d.getTime() + CONSENT_DAYS * 24 * 60 * 60 * 1000);
      document.cookie = CONSENT_KEY + '=' + (granted ? 'granted' : 'denied') + ';path=/;expires=' + d.toUTCString() + ';SameSite=Lax';
    } catch(e) {}
  }

  function applyConsent(granted) {
    if (typeof gtag === 'function') {
      gtag('consent', 'update', {
        'analytics_storage': granted ? 'granted' : 'denied',
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied'
      });
    }
  }

  window.setCookieConsent = function(granted) {
    saveConsent(granted);
    applyConsent(granted);
    var banner = document.getElementById('cookie-banner');
    if (banner) banner.classList.add('hidden');
  };

  // On load: apply stored consent or show banner
  var stored = getConsent();
  if (stored) {
    applyConsent(stored === 'granted');
  } else {
    document.addEventListener('DOMContentLoaded', function() {
      var banner = document.getElementById('cookie-banner');
      if (banner) banner.classList.remove('hidden');
    });
  }
})();
</script>
